[course]
name = "Software Engineering 2025-26"
num_sprints = 4
pm_base_url = "https://trackdev.org/api"
github_org = "udg-pds"
course_id = 5

# Path to the Claude session library (for LLM evaluation)
claude_scripts_path = "/home/imartin/Dropbox/work/git/claude/src"

# Sprint dates are fetched per-project from the TrackDev API.
# This section is optional — only used as fallback for temporal analysis
# if API dates are unavailable.
# [sprints]
# 1 = { start = "2026-02-16", end = "2026-03-08" }
# 2 = { start = "2026-03-09", end = "2026-03-29" }

[thresholds]
carrying_team_pct = 0.40
cramming_hours = 48
cramming_commit_pct = 0.70
single_commit_dump_lines = 200
micro_pr_max_lines = 10
low_doc_score = 2
contribution_imbalance_stddev = 1.5
low_survival_rate_stddev = 1.5
# Absolute floor: a student must be below this raw survival rate AND
# more than low_survival_rate_stddev z-below-mean to fire LOW_SURVIVAL_RATE.
# Prevents flagging a 90% survivor on a team where everyone is at 95-99%.
low_survival_absolute_floor = 0.85
raw_normalized_divergence_threshold = 0.20

# Build commands per repo type. Key is regex matched against repo directory name.
[[build.profiles]]
repo_pattern = "^android-"
command = "./gradlew assembleDebug"
timeout_seconds = 300
working_dir = "."
env = {}

[[build.profiles]]
repo_pattern = "^spring-"
command = "./gradlew bootJar"
timeout_seconds = 180
working_dir = "."
env = {}

[build]
max_parallel_builds = 5
stderr_max_chars = 2000
skip_already_tested = true

# Curriculum knowledge base for AI detection
[curriculum]
slides_dir = "/home/imartin/Dropbox/work/docencia/Grau/PDS/presentacions"
extra_allowed_imports = [
    "android.os.*", "android.widget.*", "android.view.*",
    "androidx.appcompat.*", "androidx.recyclerview.*", "androidx.lifecycle.*",
    "org.springframework.boot.*", "org.springframework.web.*",
    "org.springframework.data.*",
    "java.util.*", "java.io.*", "java.net.*",
]
# android_template_repo = "/path/to/android-template"
# spring_template_repo = "/path/to/spring-template"

# Regularity scoring (sigmoid-based decay toward deadline)
[regularity]
midpoint_hours = 24
steepness = 0.15
excellent_threshold = 0.85
good_threshold = 0.50
late_threshold = 0.20
cramming_threshold = 0.08
after_deadline_score = 0.0

# Repo analysis — task similarity grouping + temporal PR categorization
# (all keys optional; defaults defined in src/config.py RepoAnalysisConfig)
[repo_analysis]
enable_task_similarity = true
enable_temporal_analysis = true
# Task similarity grouping — groups by (stack, layer, action); no weights.
max_clusters_per_task = 3
outlier_points_stddev = 2.0  # legacy (pre-MAD)
outlier_lar_stddev = 1.5     # legacy (pre-MAD)
# v2 — MAD-based outlier detection + cosmetic PR flagging
group_min_size = 4
mad_k_threshold = 2.5
cosmetic_share_threshold = 0.5
# Temporal tier thresholds, in hours before sprint deadline (Phase 4)
temporal_early_hours = 96
temporal_moderate_hours = 72
temporal_late_hours = 48

# Detector thresholds (T-P1.3) — knobs previously hardcoded in flags.rs and
# trajectory.rs. All keys are optional; omitting a key falls back to the
# value baked into the binary.
[detector_thresholds]
# team_inequality: gini cutoffs for WARNING / CRITICAL
gini_warn = 0.35
gini_crit = 0.50
# low_composite_score: composite cutoffs for WARNING / CRITICAL
composite_warn = 0.20
composite_crit = 0.10
# all_prs_late: avg regularity below this trips the flag
late_regularity = 0.20
# team_inequality_is_material_outlier: |value - average| / |average|
team_inequality_outlier_deviation = 0.35
# trajectory classification (cv bands + slope p-value gate)
trajectory_cv_low = 0.20
trajectory_cv_high = 0.40
trajectory_slope_p_value = 0.15
# regularity_declining: delta = avg_curr - avg_prev
regularity_declining_delta = -0.30
# survival cosmetic-rewrite reporting threshold (cosmetic / LAT)
cosmetic_rewrite_pct_of_lat = 0.05
# bulk_rename_pr: ratio = min(adds,dels) / max(adds,dels), with a line floor
bulk_rename_adds_dels_ratio = 0.8
bulk_rename_line_floor = 50
