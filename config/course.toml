[course]
name = "Software Engineering 2025-26"
num_sprints = 4
pm_base_url = "https://trackdev.org/api"
github_org = "udg-pds"
course_id = 5

# Path to the Claude session library (for LLM evaluation)
claude_scripts_path = "/home/imartin/Dropbox/work/git/claude/src"

# Sprint dates are fetched per-project from the TrackDev API.
# This section is optional — only used as fallback for temporal analysis
# if API dates are unavailable.
# [sprints]
# 1 = { start = "2026-02-16", end = "2026-03-08" }
# 2 = { start = "2026-03-09", end = "2026-03-29" }

[thresholds]
carrying_team_pct = 0.40
cramming_hours = 48
cramming_commit_pct = 0.70
single_commit_dump_lines = 200
micro_pr_max_lines = 10
low_doc_score = 2
contribution_imbalance_stddev = 1.5
# Absolute floor: |share - 1/n| must exceed this (in absolute share units, i.e.
# 0.05 = 5pp) on top of the z-score test. Prevents firing on tight teams where
# a 3-4pp gap from equal share already lands at z>1.5.
contribution_imbalance_min_abs_deviation = 0.05
low_survival_rate_stddev = 1.5
# Absolute floor: a student must be below this raw survival rate AND
# more than low_survival_rate_stddev z-below-mean to fire LOW_SURVIVAL_RATE.
# Prevents flagging a 90% survivor on a team where everyone is at 95-99%.
low_survival_absolute_floor = 0.85
raw_normalized_divergence_threshold = 0.20

# Build commands per repo type. Key is regex matched against repo directory name.
#
# Daemon mode is on (gradle's default) so warm JVMs and the kotlinc
# daemon stay alive across PRs — without that, each build pays a 60-120s
# cold-start tax. The compile_stage walks /proc descendants of the shell
# on timeout to actually kill the daemon (it `setsid()`s into its own
# session so a process-group kill alone does not reach it), and
# orchestration::run_pipeline sweeps any orphan daemon left over from a
# prior crashed run before the new pipeline starts. Heap caps are set
# in ~/.gradle/gradle.properties via org.gradle.jvmargs if needed.
[[build.profiles]]
repo_pattern = "^android-"
command = "./gradlew assembleDebug"
timeout_seconds = 300
working_dir = "."
env = {}
# Untracked per-team build secrets the AGP / Firebase plugins require
# but students don't (and shouldn't) commit. `src` is resolved
# relative to the cloned source repo
# (data/entregues/<project>/<repo>/<src>); each team contributes
# their own file at that path. `dest` is relative to the worktree
# root. Missing source → warn and continue (some teams may not need
# Firebase). Add `app/google-services.json` and `local.properties`
# to each cloned repo's `.git/info/exclude` so they survive across
# fetches.
overlay_files = [
    { src = "app/google-services.json", dest = "app/google-services.json" },
    { src = "local.properties",         dest = "local.properties" },
]

[[build.profiles]]
repo_pattern = "^spring-"
command = "./gradlew bootJar"
timeout_seconds = 180
working_dir = "."
env = {}
# Files copied into every worktree before the build runs.
# `src` is resolved relative to the cloned source repo
# (data/entregues/<project>/<repo>/<src>) — so each team's own
# secrets file is found automatically. `dest` is relative to the
# worktree root.
overlay_files = [
    { src = "app/google-services.json", dest = "app/google-services.json" },
    { src = "local.properties",         dest = "local.properties" },
]

[build]
max_parallel_builds = 2
stderr_max_chars = 2000
skip_already_tested = true

# Curriculum knowledge base for AI detection
[curriculum]
slides_dir = "/home/imartin/Dropbox/work/docencia/Grau/PDS/presentacions"
extra_allowed_imports = [
    "android.os.*", "android.widget.*", "android.view.*",
    "androidx.appcompat.*", "androidx.recyclerview.*", "androidx.lifecycle.*",
    "org.springframework.boot.*", "org.springframework.web.*",
    "org.springframework.data.*",
    "java.util.*", "java.io.*", "java.net.*",
]
# android_template_repo = "/path/to/android-template"
# spring_template_repo = "/path/to/spring-template"
# When true, the orchestrator snapshots curriculum_concepts into
# curriculum_concepts_snapshot for any sprint whose end_date has passed,
# so re-running past sprints uses the curriculum-as-taught at that time
# instead of silently re-grading them under newly-edited slides (T-P2.5).
# Default false. `sprint-grader freeze-curriculum --sprint <N>` is the
# explicit per-sprint alternative.
# freeze_after_sprint_end = true

# Regularity scoring (sigmoid-based decay toward deadline)
[regularity]
midpoint_hours = 24
steepness = 0.15
excellent_threshold = 0.85
good_threshold = 0.50
late_threshold = 0.20
cramming_threshold = 0.08
after_deadline_score = 0.0

# Repo analysis — task similarity grouping + temporal PR categorization
# (all keys optional; defaults defined in src/config.py RepoAnalysisConfig)
[repo_analysis]
enable_task_similarity = true
enable_temporal_analysis = true
# Task similarity grouping — groups by (stack, layer, action); no weights.
max_clusters_per_task = 3
outlier_points_stddev = 2.0  # legacy (pre-MAD)
outlier_lar_stddev = 1.5     # legacy (pre-MAD)
# v2 — MAD-based outlier detection + cosmetic PR flagging
group_min_size = 4
mad_k_threshold = 2.5
cosmetic_share_threshold = 0.5
# Temporal tier thresholds, in hours before sprint deadline (Phase 4)
temporal_early_hours = 96
temporal_moderate_hours = 72
temporal_late_hours = 48

# Detector thresholds (T-P1.3) — knobs previously hardcoded in flags.rs and
# trajectory.rs. All keys are optional; omitting a key falls back to the
# value baked into the binary.
[detector_thresholds]
# team_inequality: gini cutoffs for WARNING / CRITICAL
gini_warn = 0.35
gini_crit = 0.50
# low_composite_score: composite cutoffs for WARNING / CRITICAL
composite_warn = 0.20
composite_crit = 0.10
# all_prs_late: avg regularity below this trips the flag
late_regularity = 0.20
# team_inequality_is_material_outlier: |value - average| / |average|
team_inequality_outlier_deviation = 0.35
# trajectory classification (cv bands + slope p-value gate)
trajectory_cv_low = 0.20
trajectory_cv_high = 0.40
trajectory_slope_p_value = 0.15
# regularity_declining: delta = avg_curr - avg_prev
regularity_declining_delta = -0.30
# survival cosmetic-rewrite reporting threshold (cosmetic / LAT)
cosmetic_rewrite_pct_of_lat = 0.05
# bulk_rename_pr: ratio = min(adds,dels) / max(adds,dels), with a line floor
bulk_rename_adds_dels_ratio = 0.8
bulk_rename_line_floor = 50
# ARCHITECTURE_HOTSPOT (T-P3.1): summed blame-attribution weight at or above
# which a student fires. 1.0 ≈ "owns one full violation"; default 2.0 picks
# up students who own multiple violations or a clear majority of one
# severe span.
architecture_hotspot_min_weighted = 2.0

# Anti-gaming: per-run threshold jitter (T-P2.6).
#
# When hidden_thresholds = true, every fractional detector knob above is
# uniformly jittered by ±jitter_pct once at pipeline start, seeded by
# (today, course_id). Two runs on the same `--today` reproduce; runs on
# different `--today` may differ within the band. The realised values
# land in `pipeline_run` for audit; reports show only the published
# threshold and the band, never the realised value.
#
# Default off. Roll out only after the course's grading policy is
# publicly amended to permit a published-band-only disclosure.
[grading]
hidden_thresholds = false
jitter_pct = 0.05

# Architecture LLM review (T-P3.3). When `llm_review = true` AND
# `ANTHROPIC_API_KEY` is set, the pipeline asks an LLM to grade each
# Java file against the markdown rubric in `architecture.md`. Each
# `(file_sha, rubric_version+body_hash, model_id)` triple is cached in
# `architecture_llm_cache`, so re-runs only re-pay for files whose
# content changed. Default off.
[architecture]
llm_review = true
judge = "deepseek-api"
model_id = "deepseek-v4-pro"
thinking = "enabled"
# REQUIRED. No default — empty/missing causes Config::load to fail. This
# is a deliberate guard: the CLI judge would otherwise silently fall
# back to whatever model the user's Claude session points at (Opus on
# Max plans), draining quota.
# DeepSeek V4 names: "deepseek-v4-flash" (cheap, fast) or
# "deepseek-v4-pro" (slower, stronger). The legacy names
# "deepseek-chat" / "deepseek-reasoner" alias to V4-flash
# non-thinking / thinking and are deprecated 2026-07-24.
# model_id = "claude-haiku-4-5-20251001"
# DeepSeek V4 thinking mode. Optional; one of "enabled" or "disabled".
# Omit to let the server pick its default (currently "enabled").
# Set to "disabled" on cheap rubrics (PR-doc / task heuristics) to skip
# reasoning tokens; leave on "enabled" for architecture review.
# Ignored by claude-cli / anthropic-api backends.
# thinking = "enabled"
max_tokens = 16000
rubric_path = "architecture.md"
llm_skip_globs = [
    "**/build/**",
    "**/generated/**",
    "**/R.java",
    "**/*$$*.java",
]

# PR / task documentation evaluation. `model_id` is REQUIRED for the
# same reason as [architecture] — there is no default; missing/empty
# causes Config::load to fail. `judge` defaults to "claude-cli".
[evaluate]
judge = "deepseek-api"
model_id = "deepseek-v4-flash"

# model_id = "claude-haiku-4-5-20251001"
thinking = "disabled"  # see [architecture] thinking notes

# Mutation testing (T-P2.4). When `enabled = true` and a build profile
# sets `mutation_command` (typically `./gradlew pitest --info` for the
# Pitest Gradle plugin in `scmMutationCoverage` mode), the compile
# stage runs the mutation command after a successful primary build and
# parses the resulting `mutations.xml`. Per-PR rows go into
# `pr_mutation` and feed the `LOW_MUTATION_SCORE` flag (WARNING below
# `warning_threshold`, INFO below `info_threshold`). Default off
# because mutation testing is slow; enable per-course once Pitest is
# wired into the projects' Gradle builds.
[mutation]
enabled = false
info_threshold = 0.50
warning_threshold = 0.30
