# Architecture conformance rules (T-P2.2).
#
# `severity` (default "WARNING") is applied to every emitted violation.
# Rules are evaluated against every Java file with a `package`
# declaration. Files with no `package` (default-package) are skipped.
#
# Patterns use `**` (any number of package segments) and `*` (one
# segment). They match against package names: `com.example.domain.user`
# splits to four segments. Slashes in patterns are segment separators
# regardless of source — `**/domain/**` matches `domain.user` and
# `com.x.domain`.
#
# Two rule kinds:
# - `[[layers]]` defines a named layer + its allow-list of layers it may
#   import from. An import targeting a layer outside the allow-list
#   produces a `layer_dependency` violation.
# - `[[forbidden]]` defines packages whose files must not import from a
#   blacklist (typically: keep framework imports out of the domain
#   layer). Produces a `forbidden_import` violation.

severity = "WARNING"

# --- Layered model for the Spring backend -----------------------------
#
# Mirrors the Spring rubric in `config/architecture-spring.md`:
#   presentation  →  application  →  infrastructure  →  domain
#
# Notably:
# - Services (application) DO call repositories (infrastructure). The
#   rubric explicitly prescribes this.
# - Controllers (presentation) MUST NOT reach the repository layer
#   directly — they go through services. Hence presentation lists only
#   `application` and `domain` in `may_depend_on`.
# - Repositories (infrastructure) do NOT call services or controllers.
#   Hence infrastructure lists only `domain` in `may_depend_on`.
# - Domain / model is portable; depends on nothing.

[[layers]]
name = "domain"
packages = ["**/domain/**", "**/model/**"]
may_depend_on = []

[[layers]]
name = "infrastructure"
packages = ["**/infrastructure/**", "**/repository/**", "**/persistence/**"]
may_depend_on = ["domain"]

[[layers]]
name = "application"
packages = ["**/application/**", "**/service/**", "**/usecase/**"]
may_depend_on = ["domain", "infrastructure"]

[[layers]]
name = "presentation"
packages = ["**/controller/**", "**/web/**", "**/api/**", "**/rest/**"]
may_depend_on = ["application", "domain"]

# --- Forbidden imports --------------------------------------------------
#
# Per `architecture-spring.md`: domain/model classes must not depend on Spring
# web, Spring data, or `javax.servlet.*`. JPA annotations on domain
# entities ARE acceptable in this course (the rubric does not forbid
# them), so there is no `domain-no-jpa` block.

[[forbidden]]
name = "domain-no-spring-web"
from = "**/domain/**"
must_not_match = [
    "org/springframework/web/**",
    "org/springframework/data/**",
    "javax/servlet/**",
]

# --- AST rules (T-P3.1) -------------------------------------------------
#
# AST rules look inside class bodies, so they catch architectural sins
# that don't show up as cross-package imports — e.g. a controller that
# *injects* a repository via constructor parameter where the repository
# lives in the same root package, or a fat method on a controller.
#
# `class_match` is an AND of any subset of:
#   - annotation     — class carries `@<name>` (or any qualified form ending in <name>)
#   - extends        — class extends a class whose simple name matches
#   - implements     — class implements an interface whose simple name matches
#   - package_glob   — file's package matches the glob
#   - name_suffix    — class name ends with the given suffix (Android-friendly)
#   - not_extends    — fail the match when the extends clause names this class
#
# Kinds supported (T-P3.1 + W1/W2 plan):
#   - forbidden_field_type        (`type_regex`, optional `required_modifier`,
#                                  `type_allowlist`, `type_package_allowlist`)
#   - forbidden_constructor_param (`type_regex`)
#   - forbidden_method_call       (`call_regex`, optional `arg_count`)
#   - forbidden_return_type       (`type_regex`, optional `visibility`,
#                                  `type_allowlist`, `type_package_allowlist`)
#   - forbidden_method_param      (`type_regex`, optional `visibility`,
#                                  `type_allowlist`, `type_package_allowlist`)
#   - max_method_statements       (`max`)
#   - forbidden_import            (`import_regex`)  — file-level
#   - must_null_in_lifecycle      (`type_regex`, `method_name`)
#   - forbidden_call_source       (`source_regex`)  — raw source-text match
#   - class_has_forbidden_annotation        (`annotation_regex`, `scope`)
#   - method_annotation_visibility_mismatch (`annotation_regex`, `required_visibility`)
#   - forbidden_constructor_call  (`type_regex`, optional `min_args`)
#   - parameter_annotation_requires_companion (`trigger_annotation`, `required_annotation_regex`)
#   - field_count_with_type_pattern (`type_regex`, `max`)

# --- Legacy AST rules (kept for cache continuity) -----------------------
#
# These are the pre-v8 rules wired up in T-P3.1. They overlap with the
# new SHOUTY_SNAKE_CASE rules below but their `rule_name` is referenced
# from `architecture_runs` cache entries on already-graded repos, so
# removing them would invalidate the head_sha skip path. They stay.

# Spring: controllers don't hold repositories.
[[ast_rule]]
name = "controller-no-repository-field"
class_match.annotation = "RestController"
kind = "forbidden_field_type"
type_regex = ".*Repository$"
severity = "WARNING"

# Spring: same idea via constructor injection (catches DI-by-type).
[[ast_rule]]
name = "controller-no-repository-ctor-param"
class_match.annotation = "RestController"
kind = "forbidden_constructor_param"
type_regex = ".*Repository$"
severity = "WARNING"

# Spring: keep controllers thin (>20 statements is almost certainly business logic).
[[ast_rule]]
name = "controller-method-not-fat"
class_match.annotation = "RestController"
kind = "max_method_statements"
max = 20
severity = "INFO"

# --- Spring v8 rubric ---------------------------------------------------
#
# Verbatim rule IDs from `config/spring-boot-rubric.md` (v8). Severity
# matches the rubric's table. The non-DTO 3-stage gate
# (CONTROLLER_RETURNS_NON_DTO, SERVICE_PUBLIC_METHOD_USES_NON_DTO) uses:
#
#   type_regex             = ".+"                — fire on any type
#   type_allowlist         = "(?i).*(dto|request|response).*|<stdlib>" — name suppressor
#   type_package_allowlist = "(?i)(^|\\.)(dto|dtos)(\\.|$)"            — package suppressor
#
# Rust's `regex` crate has no lookaround, so the plan's lookahead-based
# `type_regex` is folded into `type_allowlist`. Stages 1 (package), 2
# (DTO-shape name) and 3 (stdlib name) are all positive suppressors —
# any match suppresses the finding.

# CONTROLLER_RETURNS_NON_DTO — controllers must return DTOs.
[[ast_rule]]
name = "CONTROLLER_RETURNS_NON_DTO"
class_match.annotation = "RestController"
kind = "forbidden_return_type"
visibility = "public"
type_regex = ".+"
type_allowlist = "(?i).*(dto|request|response).*|^(Void|Boolean|Byte|Short|Integer|Long|Float|Double|Character|String|BigDecimal|BigInteger|UUID|LocalDate|LocalDateTime|LocalTime|Instant|Duration|Period|ZonedDateTime|OffsetDateTime|Date|URI|URL|Object|Map|HashMap|Number)$"
type_package_allowlist = "(?i)(^|\\.)(dto|dtos)(\\.|$)"
severity = "CRITICAL"

# CONTROLLER_USES_REPOSITORY — field form (alias for the legacy rule).
[[ast_rule]]
name = "CONTROLLER_USES_REPOSITORY"
class_match.annotation = "RestController"
kind = "forbidden_field_type"
type_regex = ".*Repository$"
severity = "CRITICAL"

# CONTROLLER_USES_REPOSITORY — constructor-param form.
[[ast_rule]]
name = "CONTROLLER_USES_REPOSITORY"
class_match.annotation = "RestController"
kind = "forbidden_constructor_param"
type_regex = ".*Repository$"
severity = "CRITICAL"

# CONTROLLER_HAS_TRANSACTIONAL — `@Transactional` on a `@RestController`
# class or any of its methods.
[[ast_rule]]
name = "CONTROLLER_HAS_TRANSACTIONAL"
class_match.annotation = "RestController"
kind = "class_has_forbidden_annotation"
annotation_regex = "^Transactional$"
scope = "class_or_method"
severity = "CRITICAL"

# TRANSACTIONAL_ON_NON_PUBLIC_METHOD — Spring AOP can't intercept
# non-public methods, so the annotation is silently ignored.
[[ast_rule]]
name = "TRANSACTIONAL_ON_NON_PUBLIC_METHOD"
kind = "method_annotation_visibility_mismatch"
annotation_regex = "^Transactional$"
required_visibility = "public"
severity = "CRITICAL"

# UNBOUNDED_FIND_ALL — `<id>.findAll()` (zero args) inside a stereotyped
# class. `findAll(pageable)`/`findAll(spec, pageable)` do not fire.
[[ast_rule]]
name = "UNBOUNDED_FIND_ALL"
class_match.annotation = "RestController"
kind = "forbidden_method_call"
call_regex = "\\.findAll$"
arg_count = 0
severity = "CRITICAL"

[[ast_rule]]
name = "UNBOUNDED_FIND_ALL"
class_match.annotation = "Service"
kind = "forbidden_method_call"
call_regex = "\\.findAll$"
arg_count = 0
severity = "CRITICAL"

[[ast_rule]]
name = "UNBOUNDED_FIND_ALL"
class_match.annotation = "Component"
kind = "forbidden_method_call"
call_regex = "\\.findAll$"
arg_count = 0
severity = "CRITICAL"

# ENTITY_USES_LOMBOK_DATA — `@Data` / `@EqualsAndHashCode` / `@ToString`
# on an `@Entity` class.
[[ast_rule]]
name = "ENTITY_USES_LOMBOK_DATA"
class_match.annotation = "Entity"
kind = "class_has_forbidden_annotation"
annotation_regex = "^(Data|EqualsAndHashCode|ToString)$"
scope = "class"
severity = "CRITICAL"

# ENTITY_USES_JAVAX_IMPORT — Spring Boot 3 ignores `javax.*` annotations.
[[ast_rule]]
name = "ENTITY_USES_JAVAX_IMPORT"
class_match.annotation = "Entity"
kind = "forbidden_import"
import_regex = "^javax\\.(persistence|validation)\\."
severity = "CRITICAL"

# FAT_CONTROLLER_METHOD — body span > 25 top-level statements.
# Aliases the legacy `controller-method-not-fat` rule with the rubric ID;
# threshold raised to 25 to match the rubric prose.
[[ast_rule]]
name = "FAT_CONTROLLER_METHOD"
class_match.annotation = "RestController"
kind = "max_method_statements"
max = 25
severity = "WARNING"

# MANUAL_DTO_MAPPING_IN_CONTROLLER — `new <X>(Dto|Response|Request)(...)`
# with at least two args, inside a controller method body.
[[ast_rule]]
name = "MANUAL_DTO_MAPPING_IN_CONTROLLER"
class_match.annotation = "RestController"
kind = "forbidden_constructor_call"
type_regex = "^\\w+(Dto|Response|Request)$"
min_args = 2
severity = "WARNING"

# MISSING_VALID_ON_REQUEST_BODY — `@RequestBody` without `@Valid` /
# `@Validated` on the same parameter.
[[ast_rule]]
name = "MISSING_VALID_ON_REQUEST_BODY"
class_match.annotation = "RestController"
kind = "parameter_annotation_requires_companion"
trigger_annotation = "RequestBody"
required_annotation_regex = "^(Valid|Validated)$"
severity = "WARNING"

# SERVICE_PUBLIC_METHOD_USES_NON_DTO — public method return type.
[[ast_rule]]
name = "SERVICE_PUBLIC_METHOD_USES_NON_DTO"
class_match.annotation = "Service"
kind = "forbidden_return_type"
visibility = "public"
type_regex = ".+"
type_allowlist = "(?i).*(dto|request|response).*|^(Void|Boolean|Byte|Short|Integer|Long|Float|Double|Character|String|BigDecimal|BigInteger|UUID|LocalDate|LocalDateTime|LocalTime|Instant|Duration|Period|ZonedDateTime|OffsetDateTime|Date|URI|URL|Object|Map|HashMap|Number)$"
type_package_allowlist = "(?i)(^|\\.)(dto|dtos)(\\.|$)"
severity = "WARNING"

# SERVICE_PUBLIC_METHOD_USES_NON_DTO — public method parameter type.
[[ast_rule]]
name = "SERVICE_PUBLIC_METHOD_USES_NON_DTO"
class_match.annotation = "Service"
kind = "forbidden_method_param"
visibility = "public"
type_regex = ".+"
type_allowlist = "(?i).*(dto|request|response).*|^(Void|Boolean|Byte|Short|Integer|Long|Float|Double|Character|String|BigDecimal|BigInteger|UUID|LocalDate|LocalDateTime|LocalTime|Instant|Duration|Period|ZonedDateTime|OffsetDateTime|Date|URI|URL|Object|Map|HashMap|Number)$"
type_package_allowlist = "(?i)(^|\\.)(dto|dtos)(\\.|$)"
severity = "WARNING"

# SERVICE_USES_MULTIPLE_REPOSITORIES — one repository per service.
[[ast_rule]]
name = "SERVICE_USES_MULTIPLE_REPOSITORIES"
class_match.annotation = "Service"
kind = "field_count_with_type_pattern"
type_regex = ".*Repository$"
max = 1
severity = "WARNING"

# ENTITY_DEPENDS_ON_SPRING_BEAN — `@Entity` holding a Service/Repository
# /Component field.
[[ast_rule]]
name = "ENTITY_DEPENDS_ON_SPRING_BEAN"
class_match.annotation = "Entity"
kind = "forbidden_field_type"
type_regex = ".*(Service|Repository|Component)$"
severity = "WARNING"

# --- Legacy Android AST rules (pre-v1 rubric, kept for cache continuity) ---
#
# Pre-v1 rules. Their rule_names appear in already-cached
# architecture_runs.head_sha rows, so removing them would force a rescan
# of every previously-graded repo. Functionally subsumed by the new
# SHOUTY_SNAKE_CASE rules below (FRAGMENT_BYPASSES_VIEWMODEL +
# VIEWMODEL_BYPASSES_REPOSITORY), but kept additively.

# Android: Activities and Fragments must not hold a Retrofit/ApiService directly.
[[ast_rule]]
name = "activity-no-retrofit-field"
class_match.extends = "Activity"
kind = "forbidden_field_type"
type_regex = "^(Retrofit|.*ApiService)$"
severity = "WARNING"

[[ast_rule]]
name = "fragment-no-retrofit-field"
class_match.extends = "Fragment"
kind = "forbidden_field_type"
type_regex = "^(Retrofit|.*ApiService)$"
severity = "WARNING"

# Android: ViewModels must not hold a Retrofit/ApiService directly — they
# go through a repository.
[[ast_rule]]
name = "viewmodel-no-retrofit-field"
class_match.extends = "ViewModel"
kind = "forbidden_field_type"
type_regex = "^(Retrofit|.*ApiService)$"
severity = "WARNING"

[[ast_rule]]
name = "viewmodel-no-retrofit-ctor-param"
class_match.extends = "ViewModel"
kind = "forbidden_constructor_param"
type_regex = "^(Retrofit|.*ApiService)$"
severity = "WARNING"

# --- Android v1 rubric --------------------------------------------------
#
# Verbatim rule IDs from `config/android-rubric.md` (v1). Severity
# matches the rubric's table.
#
# Class identification (rubric §"Class identification by name suffix"):
#   ViewModel   = name_suffix "ViewModel"   OR extends "ViewModel" / "AndroidViewModel"
#                                            OR annotation "HiltViewModel"
#   Fragment    = name_suffix "Fragment"    OR extends "Fragment" / "DialogFragment"
#                                            / "BottomSheetDialogFragment" / "PreferenceFragmentCompat"
#   Activity    = name_suffix "Activity"    OR extends "Activity" / "AppCompatActivity"
#                                            / "FragmentActivity" / "ComponentActivity"
#   Repository  = name_suffix "Repository"
#
# Where a rule needs multiple class shapes, multiple `[[ast_rule]]`
# blocks share the same `name = "..."` — the violations PK collapses
# duplicates produced when one class matches several shapes.

# --- VIEWMODEL_IMPORTS_ANDROID_UI --- CRITICAL ---
#
# A ViewModel must not see the View layer; importing it virtually
# guarantees a memory leak. Three class-shape variants share one
# import_regex.

[[ast_rule]]
name = "VIEWMODEL_IMPORTS_ANDROID_UI"
class_match.name_suffix = "ViewModel"
kind = "forbidden_import"
import_regex = "^(android\\.view\\.|android\\.widget\\.|.+\\.[A-Z]\\w*Binding$|.+\\.\\w*(Fragment|Activity)\\w*$)"
severity = "CRITICAL"

[[ast_rule]]
name = "VIEWMODEL_IMPORTS_ANDROID_UI"
class_match.extends = "ViewModel"
kind = "forbidden_import"
import_regex = "^(android\\.view\\.|android\\.widget\\.|.+\\.[A-Z]\\w*Binding$|.+\\.\\w*(Fragment|Activity)\\w*$)"
severity = "CRITICAL"

[[ast_rule]]
name = "VIEWMODEL_IMPORTS_ANDROID_UI"
class_match.extends = "AndroidViewModel"
kind = "forbidden_import"
import_regex = "^(android\\.view\\.|android\\.widget\\.|.+\\.[A-Z]\\w*Binding$|.+\\.\\w*(Fragment|Activity)\\w*$)"
severity = "CRITICAL"

# --- VIEWMODEL_HOLDS_CONTEXT --- CRITICAL ---
#
# The ViewModel outlives its Activity/Fragment, so any Context/Activity/
# Fragment/View field leaks them. AndroidViewModel is exempt (it holds an
# Application reference, which is process-scoped).

[[ast_rule]]
name = "VIEWMODEL_HOLDS_CONTEXT"
class_match.extends = "ViewModel"
class_match.not_extends = "AndroidViewModel"
kind = "forbidden_field_type"
type_regex = "^(Context|Activity|AppCompatActivity|FragmentActivity|Fragment|View|ViewGroup|TextView|Button|EditText|ImageView|RecyclerView)$"
severity = "CRITICAL"

[[ast_rule]]
name = "VIEWMODEL_HOLDS_CONTEXT"
class_match.name_suffix = "ViewModel"
class_match.not_extends = "AndroidViewModel"
kind = "forbidden_field_type"
type_regex = "^(Context|Activity|AppCompatActivity|FragmentActivity|Fragment|View|ViewGroup|TextView|Button|EditText|ImageView|RecyclerView)$"
severity = "CRITICAL"

# --- FRAGMENT_BYPASSES_VIEWMODEL --- CRITICAL ---
#
# The View layer must talk only to its ViewModel — no Retrofit / repo
# / ApiService fields, no direct retrofit2.* imports.

[[ast_rule]]
name = "FRAGMENT_BYPASSES_VIEWMODEL"
class_match.name_suffix = "Fragment"
kind = "forbidden_field_type"
type_regex = ".*(Repository|ApiService)$"
severity = "CRITICAL"

[[ast_rule]]
name = "FRAGMENT_BYPASSES_VIEWMODEL"
class_match.name_suffix = "Activity"
kind = "forbidden_field_type"
type_regex = ".*(Repository|ApiService)$"
severity = "CRITICAL"

[[ast_rule]]
name = "FRAGMENT_BYPASSES_VIEWMODEL"
class_match.name_suffix = "Fragment"
kind = "forbidden_import"
import_regex = "^retrofit2\\."
severity = "CRITICAL"

[[ast_rule]]
name = "FRAGMENT_BYPASSES_VIEWMODEL"
class_match.name_suffix = "Activity"
kind = "forbidden_import"
import_regex = "^retrofit2\\."
severity = "CRITICAL"

# --- REPOSITORY_DEPENDS_ON_VIEW_LAYER --- CRITICAL ---
#
# Repositories must not see UI types. Plain `android.content.Context`
# is allowed (Hilt @ApplicationContext); excluded from the field/param
# type regex below.

[[ast_rule]]
name = "REPOSITORY_DEPENDS_ON_VIEW_LAYER"
class_match.name_suffix = "Repository"
kind = "forbidden_field_type"
type_regex = "^(Activity|AppCompatActivity|FragmentActivity|Fragment|View|ViewGroup|TextView|Button|EditText|ImageView|RecyclerView|.+ViewModel|.+Binding)$"
severity = "CRITICAL"

[[ast_rule]]
name = "REPOSITORY_DEPENDS_ON_VIEW_LAYER"
class_match.name_suffix = "Repository"
kind = "forbidden_method_param"
type_regex = "^(Activity|AppCompatActivity|FragmentActivity|Fragment|View|ViewGroup|TextView|Button|EditText|ImageView|RecyclerView|.+ViewModel|.+Binding)$"
severity = "CRITICAL"

[[ast_rule]]
name = "REPOSITORY_DEPENDS_ON_VIEW_LAYER"
class_match.name_suffix = "Repository"
kind = "forbidden_import"
import_regex = "^(android\\.app\\.Activity$|androidx\\.fragment\\.app\\.Fragment$|androidx\\.appcompat\\.app\\.AppCompatActivity$|android\\.view\\.|android\\.widget\\.)"
severity = "CRITICAL"

# --- ASYNCTASK_USAGE --- CRITICAL ---
#
# AsyncTask was deprecated in API 30 and removed from new SDKs. No class
# shape gate — the rule fires anywhere AsyncTask is imported. We attach
# it to a generic class match by extending `Object`-shaped classes (i.e.
# every public class) via the package_glob escape hatch: an empty match
# means "match every class". We approximate that with a wildcard
# package_glob.

[[ast_rule]]
name = "ASYNCTASK_USAGE"
class_match.package_glob = "**"
kind = "forbidden_import"
import_regex = "^android\\.os\\.AsyncTask"
severity = "CRITICAL"

# --- STATIC_VIEW_OR_CONTEXT_FIELD --- CRITICAL ---
#
# Any class holding a static reference to a UI / Context type leaks it
# process-wide.

[[ast_rule]]
name = "STATIC_VIEW_OR_CONTEXT_FIELD"
class_match.package_glob = "**"
kind = "forbidden_field_type"
type_regex = "^(Context|Activity|AppCompatActivity|FragmentActivity|Fragment|View|ViewGroup|TextView|Button|EditText|ImageView|RecyclerView)$"
required_modifier = "static"
severity = "CRITICAL"

# --- FRAGMENT_BINDING_NOT_NULLED --- CRITICAL ---
#
# A Fragment with a *Binding field must null it in onDestroyView, or
# the Fragment's View outlives the binding.

[[ast_rule]]
name = "FRAGMENT_BINDING_NOT_NULLED"
class_match.name_suffix = "Fragment"
kind = "must_null_in_lifecycle"
type_regex = ".*Binding$"
method_name = "onDestroyView"
severity = "CRITICAL"

# --- LIVEDATA_OBSERVED_WITH_FRAGMENT_THIS --- CRITICAL ---
#
# In a Fragment, the lifecycle owner of a LiveData observer MUST be
# `getViewLifecycleOwner()`, not `this` — using `this` outlives the
# View and produces duplicate observers / IllegalStateException.

[[ast_rule]]
name = "LIVEDATA_OBSERVED_WITH_FRAGMENT_THIS"
class_match.name_suffix = "Fragment"
kind = "forbidden_call_source"
source_regex = "\\.observe\\(\\s*this\\s*,"
severity = "CRITICAL"

# --- VIEWMODEL_BYPASSES_REPOSITORY --- WARNING ---
#
# The ViewModel must depend on a Repository, not on Retrofit or an API
# service directly.

[[ast_rule]]
name = "VIEWMODEL_BYPASSES_REPOSITORY"
class_match.name_suffix = "ViewModel"
kind = "forbidden_field_type"
type_regex = ".*ApiService$"
severity = "WARNING"

[[ast_rule]]
name = "VIEWMODEL_BYPASSES_REPOSITORY"
class_match.name_suffix = "ViewModel"
kind = "forbidden_import"
import_regex = "^retrofit2\\."
severity = "WARNING"

# --- FINDVIEWBYID_USAGE --- WARNING ---
#
# ViewBinding replaces every findViewById call in the project. The
# pattern matches both the dotted form (`view.findViewById(...)`,
# `this.findViewById(...)`) and the bare same-class form inherited from
# Activity (`findViewById(R.id.foo)` with no receiver). Anchoring with
# `(^|\.)` and `$` keeps the match precise — `someOther_findViewById`
# (no preceding dot) does not fire.

[[ast_rule]]
name = "FINDVIEWBYID_USAGE"
class_match.name_suffix = "Fragment"
kind = "forbidden_method_call"
call_regex = "(^|\\.)findViewById$"
severity = "WARNING"

[[ast_rule]]
name = "FINDVIEWBYID_USAGE"
class_match.name_suffix = "Activity"
kind = "forbidden_method_call"
call_regex = "(^|\\.)findViewById$"
severity = "WARNING"

# --- NAVIGATION_VIA_FRAGMENT_TRANSACTION --- WARNING ---
#
# The project uses Navigation Component; navigate via
# `NavController.navigate(...)` rather than FragmentManager.beginTransaction().

[[ast_rule]]
name = "NAVIGATION_VIA_FRAGMENT_TRANSACTION"
class_match.name_suffix = "Fragment"
kind = "forbidden_call_source"
source_regex = "beginTransaction\\(\\s*\\)\\s*\\.(?:add|replace|remove)"
severity = "WARNING"

[[ast_rule]]
name = "NAVIGATION_VIA_FRAGMENT_TRANSACTION"
class_match.name_suffix = "Activity"
kind = "forbidden_call_source"
source_regex = "beginTransaction\\(\\s*\\)\\s*\\.(?:add|replace|remove)"
severity = "WARNING"

# --- FRAGMENT_CASTS_PARENT_ACTIVITY --- WARNING ---
#
# Fragment-to-Activity coupling should go through a shared ViewModel,
# not a downcast.

[[ast_rule]]
name = "FRAGMENT_CASTS_PARENT_ACTIVITY"
class_match.name_suffix = "Fragment"
kind = "forbidden_call_source"
source_regex = "\\(\\s*\\(\\s*[A-Z]\\w*\\s*\\)\\s*(?:requireActivity|getActivity)\\(\\s*\\)\\s*\\)"
severity = "WARNING"

# --- RAW_THREAD_FOR_BACKGROUND_WORK --- WARNING ---
#
# Background work must use Executors so threads are pooled, named, and
# shut down properly. `new Thread(...)` anywhere in a Fragment /
# Activity / ViewModel / Repository fires the rule.

[[ast_rule]]
name = "RAW_THREAD_FOR_BACKGROUND_WORK"
class_match.name_suffix = "Fragment"
kind = "forbidden_constructor_call"
type_regex = "^Thread$"
severity = "WARNING"

[[ast_rule]]
name = "RAW_THREAD_FOR_BACKGROUND_WORK"
class_match.name_suffix = "Activity"
kind = "forbidden_constructor_call"
type_regex = "^Thread$"
severity = "WARNING"

[[ast_rule]]
name = "RAW_THREAD_FOR_BACKGROUND_WORK"
class_match.name_suffix = "ViewModel"
kind = "forbidden_constructor_call"
type_regex = "^Thread$"
severity = "WARNING"

[[ast_rule]]
name = "RAW_THREAD_FOR_BACKGROUND_WORK"
class_match.name_suffix = "Repository"
kind = "forbidden_constructor_call"
type_regex = "^Thread$"
severity = "WARNING"

# --- MUTABLELIVEDATA_EXPOSED_PUBLICLY --- WARNING ---
#
# Consumers (Fragments) must only see `LiveData<T>` — they should not be
# able to call setValue / postValue. Two forms: public field and public
# getter returning MutableLiveData.

[[ast_rule]]
name = "MUTABLELIVEDATA_EXPOSED_PUBLICLY"
class_match.name_suffix = "ViewModel"
kind = "forbidden_field_type"
type_regex = "^MutableLiveData$"
required_modifier = "public"
severity = "WARNING"

[[ast_rule]]
name = "MUTABLELIVEDATA_EXPOSED_PUBLICLY"
class_match.name_suffix = "ViewModel"
kind = "forbidden_return_type"
visibility = "public"
type_regex = "^MutableLiveData$"
severity = "WARNING"

# --- FAT_FRAGMENT_OR_ACTIVITY_METHOD --- WARNING ---
#
# Lifecycle methods legitimately include view binding, observer
# registration, and click listeners — threshold is higher than for a
# Spring controller. 40 top-level statements.

[[ast_rule]]
name = "FAT_FRAGMENT_OR_ACTIVITY_METHOD"
class_match.name_suffix = "Fragment"
kind = "max_method_statements"
max = 40
severity = "WARNING"

[[ast_rule]]
name = "FAT_FRAGMENT_OR_ACTIVITY_METHOD"
class_match.name_suffix = "Activity"
kind = "max_method_statements"
max = 40
severity = "WARNING"

# --- MISSING_HILT_VIEWMODEL --- WARNING ---
#
# A class extending ViewModel / AndroidViewModel with an @Inject
# constructor must carry @HiltViewModel.

[[ast_rule]]
name = "MISSING_HILT_VIEWMODEL"
class_match.extends = "ViewModel"
kind = "class_requires_annotation"
required_annotation = "HiltViewModel"
trigger_constructor_annotation = "Inject"
severity = "WARNING"

[[ast_rule]]
name = "MISSING_HILT_VIEWMODEL"
class_match.extends = "AndroidViewModel"
kind = "class_requires_annotation"
required_annotation = "HiltViewModel"
trigger_constructor_annotation = "Inject"
severity = "WARNING"
